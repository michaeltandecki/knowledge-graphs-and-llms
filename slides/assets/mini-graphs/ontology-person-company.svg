<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Ontology mini graph</title>
  <desc id="desc">Person founded Company, Company acquired Company.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6071" />
    </marker>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.34" />
    </filter>
  </defs>

  <line x1="222" y1="210" x2="388" y2="210" stroke="#4f6071" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="532" y1="210" x2="698" y2="210" stroke="#4f6071" stroke-width="3" marker-end="url(#arrow)" />

  <text x="305" y="188" fill="#8ea0b4" font-size="22" font-weight="600" text-anchor="middle" letter-spacing="0.8">FOUNDED</text>
  <text x="615" y="188" fill="#8ea0b4" font-size="22" font-weight="600" text-anchor="middle" letter-spacing="0.8">ACQUIRED</text>

  <g filter="url(#softShadow)">
    <circle cx="150" cy="210" r="72" fill="#b287b8" stroke="#d9b7dd" stroke-width="4" />
    <circle cx="460" cy="210" r="72" fill="#e6c96d" stroke="#f3df9f" stroke-width="4" />
    <circle cx="770" cy="210" r="72" fill="#e6c96d" stroke="#f3df9f" stroke-width="4" />
  </g>

  <text x="150" y="218" fill="#f7eeff" font-size="22" font-weight="700" text-anchor="middle">Person</text>
  <text x="460" y="218" fill="#15222e" font-size="22" font-weight="700" text-anchor="middle">Company</text>
  <text x="770" y="218" fill="#15222e" font-size="22" font-weight="700" text-anchor="middle">Company</text>
</svg>
